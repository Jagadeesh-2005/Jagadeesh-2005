<?xml version="1.0" encoding="UTF-8"?>

<svg xmlns="http://www.w3.org/2000/svg"
     width="1600"
     height="500"
     viewBox="0 0 1600 500">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="50%" stop-color="#0B1F45"/>
      <stop offset="100%" stop-color="#071A2F"/>
    </linearGradient>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#7B2FF7"/>
    </linearGradient>

    <pattern id="grid"
             width="40"
             height="40"
             patternUnits="userSpaceOnUse">

      <path
        d="M40 0H0V40"
        fill="none"
        stroke="#18FFFF"
        stroke-width="0.5"/>

    </pattern>

  </defs>

  <!-- Background -->

  <rect width="1600" height="500" fill="url(#bg)"/>

  <!-- Grid -->

  <rect width="1600"
        height="500"
        fill="url(#grid)"
        opacity="0.12"/>

  <!-- Decorative Rings -->

  <circle cx="220"
          cy="120"
          r="55"
          fill="none"
          stroke="#00F5FF"
          stroke-width="2"
          opacity="0.45"/>

  <circle cx="220"
          cy="120"
          r="80"
          fill="none"
          stroke="#7B2FF7"
          stroke-width="2"
          opacity="0.25"/>

  <circle cx="1380"
          cy="360"
          r="70"
          fill="none"
          stroke="#FF00FF"
          stroke-width="2"
          opacity="0.35"/>

  <!-- Dots -->

  <circle cx="250" cy="90" r="4" fill="#00F5FF"/>
  <circle cx="1340" cy="130" r="5" fill="#7B2FF7"/>
  <circle cx="1450" cy="300" r="6" fill="#FF00FF"/>
  <circle cx="1180" cy="80" r="3" fill="#00F5FF"/>
  <circle cx="420" cy="390" r="5" fill="#00F5FF"/>

  <!-- Main Name -->

  <text
      x="800"
      y="170"
      text-anchor="middle"
      font-size="72"
      font-family="Arial"
      font-weight="bold"
      fill="#FFFFFF">

      Jagadeesh

  </text>

  <!-- Role -->

  <text
      x="800"
      y="225"
      text-anchor="middle"
      font-size="32"
      font-family="Consolas"
      fill="#00F5FF">

      Artificial Intelligence • Machine Learning

  </text>

  <!-- Skills -->

  <text
      x="800"
      y="270"
      text-anchor="middle"
      font-size="24"
      font-family="Consolas"
      fill="#E8EAF6">

      Python • Java • Flask • Deep Learning • TensorFlow

  </text>

  <!-- Divider -->

  <line
      x1="470"
      y1="315"
      x2="1130"
      y2="315"
      stroke="url(#line)"
      stroke-width="3"/>

  <!-- Status -->

  <text
      x="800"
      y="365"
      text-anchor="middle"
      font-size="24"
      font-family="Consolas"
      fill="#00FF99">

      ● Available for AI &amp; Software Projects

  </text>

  <!-- Bottom Accent -->

  <rect
      x="0"
      y="492"
      width="1600"
      height="8"
      fill="url(#line)"/>

</svg>