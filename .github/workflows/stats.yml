name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate GitHub Stats
        run: |
          mkdir -p assets

          curl -L "https://github-readme-stats.vercel.app/api?username=Jagadeesh-2005&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&count_private=true" -o assets/github-stats.svg

          curl -L "https://github-readme-streak-stats.demolab.com?user=Jagadeesh-2005&theme=tokyonight&hide_border=true" -o assets/github-streak.svg

          curl -L "https://github-readme-stats.vercel.app/api/top-langs/?username=Jagadeesh-2005&layout=compact&theme=tokyonight&hide_border=true" -o assets/top-languages.svg

          curl -L "https://github-readme-activity-graph.vercel.app/graph?username=Jagadeesh-2005&theme=tokyo-night" -o assets/activity-graph.svg

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/

          git diff --staged --quiet || git commit -m "📊 Update GitHub Statistics"

          git push